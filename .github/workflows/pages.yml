name: Deploy to GitHub Pages

on:
  push:
    # Uwaga: gałęzią domyślną repo jest "claude/plugin-install-setup-ao7jcy",
    # a środowisko github-pages dopuszcza deploy tylko z gałęzi domyślnej —
    # push na "main" zawsze kończy się natychmiastowym błędem (nie z winy
    # tego workflow). Ustaw main jako default branch w Settings, żeby to
    # odwrócić, i wtedy dopisz "main" z powrotem tutaj.
    branches: [claude/plugin-install-setup-ao7jcy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
